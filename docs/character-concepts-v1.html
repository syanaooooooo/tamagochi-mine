<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Tamagotchi 角色概念稿</title>
<style>
  body { background: #1a1a2e; font-family: 'Courier New', monospace; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px; }
  h1 { color: #e2b4ff; letter-spacing: 4px; font-size: 14px; text-transform: uppercase; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 11px; margin-bottom: 48px; }
  .grid { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; }
  .card { background: #16213e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 32px 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; width: 200px; }
  .name { color: #e2b4ff; font-size: 16px; font-weight: bold; letter-spacing: 2px; }
  .species { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .tag { background: #2a2a4a; color: #b4c8ff; font-size: 10px; padding: 3px 8px; border-radius: 20px; }
  .stage-row { display: flex; gap: 20px; align-items: flex-end; margin-top: 8px; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stage-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  svg { display: block; }
</style>
</head>
<body>

<h1>Tamagotchi 角色概念</h1>
<p class="subtitle">三种风格方向 · 含成长阶段草图</p>

<div class="grid">

  <!-- ── 角色 1: Nyanchi 猫 ── -->
  <div class="card">
    <div class="name">Nyaan</div>
    <div class="species">橘猫 · 真实动物可爱化</div>

    <div class="stage-row">
      <!-- 蛋 -->
      <div class="stage">
        <svg width="36" height="40" viewBox="0 0 36 40">
          <ellipse cx="18" cy="22" rx="14" ry="17" fill="#fff9e6" stroke="#e8c87a" stroke-width="2"/>
          <ellipse cx="14" cy="20" rx="2" ry="2.5" fill="#c8a43a" opacity="0.4"/>
          <ellipse cx="22" cy="24" rx="1.5" ry="2" fill="#c8a43a" opacity="0.3"/>
          <path d="M14,28 Q18,32 22,28" stroke="#e8c87a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="stage-label">蛋</div>
      </div>

      <!-- 幼年 -->
      <div class="stage">
        <svg width="52" height="58" viewBox="0 0 52 58">
          <!-- 耳朵 -->
          <polygon points="10,22 16,8 22,22" fill="#f4a460"/>
          <polygon points="30,22 36,8 42,22" fill="#f4a460"/>
          <polygon points="13,21 16,12 19,21" fill="#ffb6c1"/>
          <polygon points="33,21 36,12 39,21" fill="#ffb6c1"/>
          <!-- 头 -->
          <ellipse cx="26" cy="30" rx="19" ry="17" fill="#f4a460"/>
          <!-- 眼睛 -->
          <ellipse cx="19" cy="27" rx="4.5" ry="5" fill="white"/>
          <ellipse cx="33" cy="27" rx="4.5" ry="5" fill="white"/>
          <circle cx="19" cy="28" r="3.2" fill="#2c1810"/>
          <circle cx="33" cy="28" r="3.2" fill="#2c1810"/>
          <circle cx="20" cy="26.5" r="1" fill="white"/>
          <circle cx="34" cy="26.5" r="1" fill="white"/>
          <!-- 鼻子 -->
          <polygon points="26,33 24,36 28,36" fill="#ff9999"/>
          <!-- 嘴 -->
          <path d="M24,36 Q26,39 28,36" stroke="#c06060" stroke-width="1.2" fill="none"/>
          <!-- 腮红 -->
          <ellipse cx="13" cy="34" rx="5" ry="3" fill="#ffb6c1" opacity="0.55"/>
          <ellipse cx="39" cy="34" rx="5" ry="3" fill="#ffb6c1" opacity="0.55"/>
          <!-- 身体小球 -->
          <ellipse cx="26" cy="51" rx="13" ry="9" fill="#f4a460"/>
          <!-- 爪子 -->
          <ellipse cx="16" cy="56" rx="5" ry="3" fill="#f0a050"/>
          <ellipse cx="36" cy="56" rx="5" ry="3" fill="#f0a050"/>
        </svg>
        <div class="stage-label">幼年</div>
      </div>

      <!-- 成年 -->
      <div class="stage">
        <svg width="68" height="76" viewBox="0 0 68 76">
          <!-- 耳朵 -->
          <polygon points="12,26 20,6 28,26" fill="#f4a460"/>
          <polygon points="40,26 48,6 56,26" fill="#f4a460"/>
          <polygon points="16,25 20,11 24,25" fill="#ffb6c1"/>
          <polygon points="44,25 48,11 52,25" fill="#ffb6c1"/>
          <!-- 头 -->
          <ellipse cx="34" cy="36" rx="25" ry="23" fill="#f4a460"/>
          <!-- 斑纹 -->
          <path d="M26,16 Q34,20 42,16" stroke="#e09040" stroke-width="2" fill="none" opacity="0.5"/>
          <!-- 眼睛 -->
          <ellipse cx="24" cy="32" rx="6" ry="7" fill="white"/>
          <ellipse cx="44" cy="32" rx="6" ry="7" fill="white"/>
          <ellipse cx="24" cy="33" rx="4.5" ry="5.5" fill="#1a0a00"/>
          <ellipse cx="44" cy="33" rx="4.5" ry="5.5" fill="#1a0a00"/>
          <!-- 瞳孔高光 -->
          <circle cx="25.5" cy="30.5" r="1.5" fill="white"/>
          <circle cx="45.5" cy="30.5" r="1.5" fill="white"/>
          <!-- 鼻子 -->
          <polygon points="34,40 31,44 37,44" fill="#ff9999"/>
          <!-- 嘴 -->
          <path d="M31,44 Q34,48 37,44" stroke="#c06060" stroke-width="1.5" fill="none"/>
          <!-- 腮红 -->
          <ellipse cx="16" cy="42" rx="7" ry="4.5" fill="#ffb6c1" opacity="0.5"/>
          <ellipse cx="52" cy="42" rx="7" ry="4.5" fill="#ffb6c1" opacity="0.5"/>
          <!-- 胡须 -->
          <line x1="4" y1="41" x2="26" y2="43" stroke="#aaa" stroke-width="1"/>
          <line x1="4" y1="45" x2="26" y2="46" stroke="#aaa" stroke-width="1"/>
          <line x1="42" y1="43" x2="64" y2="41" stroke="#aaa" stroke-width="1"/>
          <line x1="42" y1="46" x2="64" y2="45" stroke="#aaa" stroke-width="1"/>
          <!-- 身体 -->
          <ellipse cx="34" cy="64" rx="20" ry="14" fill="#f4a460"/>
          <!-- 尾巴 -->
          <path d="M54,70 Q70,55 65,42" stroke="#f4a460" stroke-width="7" fill="none" stroke-linecap="round"/>
          <!-- 爪子 -->
          <ellipse cx="20" cy="73" rx="7" ry="4" fill="#f0a050"/>
          <ellipse cx="48" cy="73" rx="7" ry="4" fill="#f0a050"/>
        </svg>
        <div class="stage-label">成年</div>
      </div>
    </div>

    <div class="tags">
      <span class="tag">暖色系</span>
      <span class="tag">亲切感强</span>
      <span class="tag">高辨识度</span>
    </div>
  </div>

  <!-- ── 角色 2: Axochi 美西螈 ── -->
  <div class="card">
    <div class="name">Axo</div>
    <div class="species">美西螈 · 独特小众物种</div>

    <div class="stage-row">
      <!-- 蛋 -->
      <div class="stage">
        <svg width="36" height="40" viewBox="0 0 36 40">
          <ellipse cx="18" cy="22" rx="14" ry="17" fill="#ffe0f0" stroke="#ffaacc" stroke-width="2"/>
          <!-- 蛋上的小气泡纹 -->
          <circle cx="13" cy="18" r="2.5" fill="none" stroke="#ffaacc" stroke-width="1" opacity="0.6"/>
          <circle cx="23" cy="25" r="1.8" fill="none" stroke="#ffaacc" stroke-width="1" opacity="0.5"/>
          <circle cx="17" cy="28" r="1.5" fill="none" stroke="#ffaacc" stroke-width="1" opacity="0.4"/>
        </svg>
        <div class="stage-label">蛋</div>
      </div>

      <!-- 幼年 -->
      <div class="stage">
        <svg width="52" height="60" viewBox="0 0 52 60">
          <!-- 外鳃 (头顶羽毛状) -->
          <path d="M18,14 Q14,4 16,0" stroke="#ff88bb" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M22,12 Q20,2 22,0" stroke="#ff88bb" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M26,12 Q26,2 26,0" stroke="#ff88bb" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M30,12 Q32,2 30,0" stroke="#ff88bb" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M34,14 Q38,4 36,0" stroke="#ff88bb" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- 鳃尖小球 -->
          <circle cx="16" cy="0" r="3" fill="#ff66aa"/>
          <circle cx="22" cy="0" r="3" fill="#ff66aa"/>
          <circle cx="26" cy="0" r="3" fill="#ff66aa"/>
          <circle cx="30" cy="0" r="3" fill="#ff66aa"/>
          <circle cx="36" cy="0" r="3" fill="#ff66aa"/>
          <!-- 头/身体 -->
          <ellipse cx="26" cy="28" rx="18" ry="16" fill="#ffb6d9"/>
          <!-- 眼睛 (大而圆) -->
          <circle cx="19" cy="25" r="5.5" fill="white"/>
          <circle cx="33" cy="25" r="5.5" fill="white"/>
          <circle cx="19" cy="26" r="3.5" fill="#1a0a20"/>
          <circle cx="33" cy="26" r="3.5" fill="#1a0a20"/>
          <circle cx="20" cy="24" r="1.2" fill="white"/>
          <circle cx="34" cy="24" r="1.2" fill="white"/>
          <!-- 笑容 -->
          <path d="M21,34 Q26,38 31,34" stroke="#e05080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- 腮红 -->
          <ellipse cx="12" cy="31" rx="5" ry="3" fill="#ff88bb" opacity="0.5"/>
          <ellipse cx="40" cy="31" rx="5" ry="3" fill="#ff88bb" opacity="0.5"/>
          <!-- 小腿 -->
          <ellipse cx="12" cy="46" rx="6" ry="4" fill="#ffb6d9" transform="rotate(-20,12,46)"/>
          <ellipse cx="40" cy="46" rx="6" ry="4" fill="#ffb6d9" transform="rotate(20,40,46)"/>
          <!-- 尾巴 -->
          <path d="M26,44 Q34,54 28,60" stroke="#ffb6d9" stroke-width="5" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="stage-label">幼年</div>
      </div>

      <!-- 成年 -->
      <div class="stage">
        <svg width="68" height="78" viewBox="0 0 68 78">
          <!-- 外鳃 -->
          <path d="M20,18 Q13,5 16,0" stroke="#ff88bb" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M25,14 Q22,2 24,0" stroke="#ff88bb" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M30,14 Q30,1 30,0" stroke="#ff88bb" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M35,14 Q38,2 36,0" stroke="#ff88bb" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M40,18 Q47,5 44,0" stroke="#ff88bb" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- 鳃尖大球 -->
          <circle cx="16" cy="0" r="4.5" fill="#ff55aa"/>
          <circle cx="24" cy="0" r="4" fill="#ff55aa"/>
          <circle cx="30" cy="0" r="4.5" fill="#ff55aa"/>
          <circle cx="36" cy="0" r="4" fill="#ff55aa"/>
          <circle cx="44" cy="0" r="4.5" fill="#ff55aa"/>
          <!-- 身体 -->
          <ellipse cx="34" cy="36" rx="24" ry="20" fill="#ffb6d9"/>
          <!-- 斑点纹理 -->
          <circle cx="26" cy="30" r="2.5" fill="#ff99cc" opacity="0.6"/>
          <circle cx="42" cy="28" r="2" fill="#ff99cc" opacity="0.5"/>
          <circle cx="38" cy="42" r="2.5" fill="#ff99cc" opacity="0.4"/>
          <!-- 眼睛 -->
          <circle cx="24" cy="30" r="8" fill="white"/>
          <circle cx="44" cy="30" r="8" fill="white"/>
          <circle cx="24" cy="31" r="5.5" fill="#160826"/>
          <circle cx="44" cy="31" r="5.5" fill="#160826"/>
          <circle cx="25.5" cy="28.5" r="1.8" fill="white"/>
          <circle cx="45.5" cy="28.5" r="1.8" fill="white"/>
          <!-- 嘴 (宽笑) -->
          <path d="M24,44 Q34,50 44,44" stroke="#e05080" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- 腮红 -->
          <ellipse cx="14" cy="40" rx="8" ry="5" fill="#ff88bb" opacity="0.45"/>
          <ellipse cx="54" cy="40" rx="8" ry="5" fill="#ff88bb" opacity="0.45"/>
          <!-- 前腿 -->
          <ellipse cx="12" cy="56" rx="8" ry="5" fill="#ffaac8" transform="rotate(-25,12,56)"/>
          <ellipse cx="56" cy="56" rx="8" ry="5" fill="#ffaac8" transform="rotate(25,56,56)"/>
          <!-- 后腿 -->
          <ellipse cx="18" cy="64" rx="7" ry="4" fill="#ffaac8" transform="rotate(-10,18,64)"/>
          <ellipse cx="50" cy="64" rx="7" ry="4" fill="#ffaac8" transform="rotate(10,50,64)"/>
          <!-- 尾巴 -->
          <path d="M34,56 Q48,68 42,78" stroke="#ffb6d9" stroke-width="6" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="stage-label">成年</div>
      </div>
    </div>

    <div class="tags">
      <span class="tag">小众物种</span>
      <span class="tag">粉嫩系</span>
      <span class="tag">独特感强</span>
    </div>
  </div>

  <!-- ── 角色 3: Mochiru 抽象怪物 ── -->
  <div class="card">
    <div class="name">Mochiru</div>
    <div class="species">黏液怪 · 抽象可爱化</div>

    <div class="stage-row">
      <!-- 蛋/孢子 -->
      <div class="stage">
        <svg width="36" height="40" viewBox="0 0 36 40">
          <!-- 不规则蛋形 -->
          <path d="M18,4 Q32,8 32,22 Q32,36 18,38 Q4,36 4,22 Q4,8 18,4Z" fill="#c8a8ff" stroke="#9966dd" stroke-width="2"/>
          <!-- 奇怪的花纹 -->
          <circle cx="18" cy="20" r="5" fill="#b090ee"/>
          <circle cx="18" cy="20" r="2.5" fill="#9966dd" opacity="0.6"/>
          <!-- 小疙瘩 -->
          <circle cx="10" cy="14" r="2" fill="#b090ee"/>
          <circle cx="26" cy="28" r="1.5" fill="#b090ee"/>
        </svg>
        <div class="stage-label">孢子</div>
      </div>

      <!-- 幼年 -->
      <div class="stage">
        <svg width="52" height="62" viewBox="0 0 52 62">
          <!-- 触手/犄角 -->
          <path d="M18,14 Q12,6 14,2" stroke="#9966dd" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M26,12 Q26,3 26,0" stroke="#9966dd" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M34,14 Q40,6 38,2" stroke="#9966dd" stroke-width="4" fill="none" stroke-linecap="round"/>
          <circle cx="14" cy="2" r="4" fill="#cc44ff"/>
          <circle cx="26" cy="0" r="4.5" fill="#cc44ff"/>
          <circle cx="38" cy="2" r="4" fill="#cc44ff"/>
          <!-- 不规则身体 -->
          <path d="M26,14 Q44,14 46,30 Q46,50 26,52 Q6,50 6,30 Q6,14 26,14Z" fill="#c8a8ff"/>
          <!-- 单眼 -->
          <ellipse cx="26" cy="28" rx="11" ry="12" fill="white"/>
          <ellipse cx="26" cy="29" rx="7.5" ry="9" fill="#6622cc"/>
          <ellipse cx="26" cy="29" rx="5" ry="6" fill="#110022"/>
          <circle cx="23" cy="26" r="2.5" fill="white"/>
          <!-- 锯齿嘴 -->
          <path d="M16,42 L18,46 L21,42 L24,46 L27,42 L30,46 L33,42 L36,46 L38,42" stroke="#6622cc" stroke-width="1.5" fill="none"/>
          <!-- 黏液滴 -->
          <path d="M10,44 Q8,50 10,54" stroke="#c8a8ff" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M42,46 Q44,52 42,56" stroke="#c8a8ff" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="stage-label">幼年</div>
      </div>

      <!-- 成年 -->
      <div class="stage">
        <svg width="68" height="80" viewBox="0 0 68 80">
          <!-- 触手 4个 -->
          <path d="M20,18 Q12,7 14,2" stroke="#8844cc" stroke-width="5" fill="none" stroke-linecap="round"/>
          <path d="M27,14 Q25,4 26,0" stroke="#8844cc" stroke-width="5" fill="none" stroke-linecap="round"/>
          <path d="M34,14 Q34,3 34,0" stroke="#8844cc" stroke-width="5" fill="none" stroke-linecap="round"/>
          <path d="M41,16 Q46,6 44,2" stroke="#8844cc" stroke-width="5" fill="none" stroke-linecap="round"/>
          <!-- 触手顶小球 -->
          <circle cx="14" cy="2" r="5.5" fill="#dd44ff"/>
          <circle cx="26" cy="0" r="5" fill="#dd44ff"/>
          <circle cx="34" cy="0" r="5.5" fill="#dd44ff"/>
          <circle cx="44" cy="2" r="5" fill="#dd44ff"/>
          <!-- 不规则身体 (有意做成歪的) -->
          <path d="M34,16 Q56,14 58,34 Q60,56 34,62 Q10,62 8,40 Q6,18 34,16Z" fill="#c8a8ff"/>
          <!-- 纹理斑点 -->
          <circle cx="22" cy="30" r="4" fill="#b090ee" opacity="0.7"/>
          <circle cx="46" cy="26" r="3" fill="#b090ee" opacity="0.6"/>
          <circle cx="44" cy="48" r="4.5" fill="#b090ee" opacity="0.5"/>
          <circle cx="20" cy="50" r="3" fill="#b090ee" opacity="0.6"/>
          <!-- 大单眼 -->
          <ellipse cx="34" cy="36" rx="14" ry="15" fill="white"/>
          <ellipse cx="34" cy="37" rx="10" ry="11" fill="#5500bb"/>
          <ellipse cx="34" cy="37" rx="6.5" ry="7.5" fill="#110022"/>
          <circle cx="30" cy="33" r="3" fill="white"/>
          <circle cx="36" cy="31" r="1.5" fill="white"/>
          <!-- 两颗小副眼 -->
          <circle cx="14" cy="34" r="5" fill="white"/>
          <circle cx="14" cy="34" r="3" fill="#7722dd"/>
          <circle cx="14" cy="34" r="1.5" fill="#110022"/>
          <circle cx="54" cy="32" r="4" fill="white"/>
          <circle cx="54" cy="32" r="2.5" fill="#7722dd"/>
          <circle cx="54" cy="32" r="1.2" fill="#110022"/>
          <!-- 嘴 (宽大锯齿) -->
          <path d="M18,52 L21,57 L25,52 L29,57 L34,52 L39,57 L43,52 L47,57 L50,52" stroke="#5500bb" stroke-width="2" fill="none"/>
          <!-- 黏液 -->
          <path d="M10,58 Q8,66 12,72" stroke="#c8a8ff" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M58,60 Q62,68 58,74" stroke="#c8a8ff" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M34,62 Q36,72 34,78" stroke="#c8a8ff" stroke-width="4" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="stage-label">成年</div>
      </div>
    </div>

    <div class="tags">
      <span class="tag">怪诞可爱</span>
      <span class="tag">紫色系</span>
      <span class="tag">记忆点强</span>
    </div>
  </div>

</div>

<p style="margin-top:56px; color:#555; font-size:11px; text-align:center;">
  概念草稿 · 最终版本将用像素风格重绘 · Tamagotchi PRD v0.1
</p>

</body>
</html>
