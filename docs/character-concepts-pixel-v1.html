<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>像素风角色概念稿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d1a;
    font-family: 'Courier New', monospace;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }
  h1 { color: #c8b4ff; letter-spacing: 6px; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; }
  .subtitle { color: #555; font-size: 10px; letter-spacing: 2px; margin-bottom: 48px; }

  .pet-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 56px;
    gap: 12px;
  }
  .pet-name { color: #c8b4ff; font-size: 14px; letter-spacing: 4px; }
  .pet-species { color: #555; font-size: 10px; letter-spacing: 2px; margin-top: -8px; }

  .stages {
    display: flex;
    gap: 36px;
    align-items: flex-end;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .stage-label {
    font-size: 9px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .divider {
    width: 240px;
    height: 1px;
    background: #1e1e36;
    margin: 8px 0 32px;
  }
</style>

<h1>像素风角色概念稿</h1>
<p class="subtitle">Scale 5x · MVP v0.1 · 蛋 / 幼年 / 成年</p>

// ─── pixel art renderer ───────────────────────────────────────────────────
function makeCanvas(w, h, scale) {
  const c = document.createElement('canvas');
  c.width = w * scale;
  c.height = h * scale;
  return c;
}

function drawPixels(canvas, rows, palette, scale) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  rows.forEach((row, y) => {
    [...row].forEach((ch, x) => {
      if (ch !== '.' && palette[ch]) {
        ctx.fillStyle = palette[ch];
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    });
  });
}

// ─── build UI ─────────────────────────────────────────────────────────────

    species: '鸽太 · 真实鸽子可爱化',
    palette: HATO_PAL,
    stages: [
      { label: '蛋', pixels: hato_egg },
      { label: '幼年', pixels: hato_young },

  },

    name: 'FUKUMARU',

      { label: '幼年', pixels: ghost_young },
      { label: '成年', pixels: ghost_adult },
    ],
  },
];

const app = document.getElementById('app');

characters.forEach((char, ci) => {
  const section = document.createElement('div');
  section.className = 'pet-section';

  section.innerHTML = `<div class="pet-name">${char.name}</div><div class="pet-species">${char.species}</div>`;

  const stagesRow = document.createElement('div');
  stagesRow.className = 'stages';

  char.stages.forEach(stage => {
    const stageDiv = document.createElement('div');
    stageDiv.className = 'stage';

    const rows = stage.pixels;
    const w = rows[0].length;
    const h = rows.length;
    const canvas = makeCanvas(w, h, SCALE);
    drawPixels(canvas, rows, char.palette, SCALE);

    const label = document.createElement('div');
    label.className = 'stage-label';
    label.textContent = stage.label;

    stageDiv.appendChild(canvas);
    stageDiv.appendChild(label);
    stagesRow.appendChild(stageDiv);
  });

  section.appendChild(stagesRow);

  if (ci < characters.length - 1) {
    const div = document.createElement('div');
    div.className = 'divider';
    section.appendChild(div);
  }

  app.appendChild(section);
});
</script>
